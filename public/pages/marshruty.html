<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Маршрути — Смакуй Волинь</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/marshruty.css" />
</head>
<body>
  <div class="page">

    <header>
      <div class="container">
        <div class="nav">
          <a href="/index.html" class="logo">
            <img src="/img/logo.png" alt="Смакуй Волинь" onerror="this.style.display='none'" />
            <div class="logo-text"></div>
          </a>
          <nav>
            <a href="/index.html">Головна</a>
            <a href="/maintours.html">Тури</a>
            <a href="/zaklady.html">Заклади</a>
            <a href="/marshruty.html" class="active">Маршрути</a>
            <a href="/kontakty.html">Контакти</a>
            <div id="auth-links"></div>
        </nav>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>Маршрути Волині</h1>
        <p>Обирай маршрут — і вирушай у смачну пригоду!</p>
      </div>
    </section>

    <section class="filter-section">
      <div class="container">
        <div class="filter-btns">
          <button class="filter-btn active" data-filter="all">Всі</button>
          <button class="filter-btn" data-filter="pishyi">🚶 Піший</button>
          <button class="filter-btn" data-filter="velo">🚴 Вело</button>
          <button class="filter-btn" data-filter="avto">🚗 Авто</button>
        </div>
      </div>
    </section>

    <section class="routes-section">
      <div class="container">
        <div class="routes-grid" id="routes-grid"></div>
      </div>
    </section>

    <section class="map-section">
      <div class="container">
        <h2>Маршрути на карті</h2>
        <p class="map-hint">Натисни "Показати на карті" на картці маршруту — і він з'явиться тут</p>
        <div class="map-wrap">
          <div id="map"></div>
        </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <div class="footer-grid">
          <div>
            <a href="/index.html" class="logo">
              <img src="/img/logo.png" alt="Смакуй Волинь" class="footer-logo" onerror="this.style.display='none'" />
            </a>
          </div>

          <div>
            <h4>Навігація</h4>
            <a href="/index.html">Головна</a>
            <a href="/maintours.html">Тури</a>
            <a href="/zaklady.html">Заклади</a>
            <a href="/marshruty.html">Маршрути</a>
            <a href="/kontakty.html">Контакти</a>
          </div>

          <div>
            <h4>Наші соцмережі</h4>
            <div class="social">
              <a class="social-icon" href="https://x.com/?lang=uk_UA" target="_blank" rel="noopener noreferrer" title="X">𝕏</a>
              <a class="social-icon" href="https://www.facebook.com/?locale=uk_UA" target="_blank" rel="noopener noreferrer" title="Facebook">f</a>
              <a class="social-icon" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" title="Instagram">◎</a>
              <a class="social-icon" href="https://ua.linkedin.com/" target="_blank" rel="noopener noreferrer" title="LinkedIn">in</a>
            </div>
          </div>
        </div>
      </div>
    </footer>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/marshruty.js"></script>\
  <script src="/js/auth-ui.js"></script>
</body>
</html>
